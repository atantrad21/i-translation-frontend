<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-Translation Medical Image Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <nav class="bg-blue-600 text-white shadow-lg p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">I-Translation</h1>
            <span class="bg-blue-800 px-3 py-1 rounded-full text-xs font-semibold">v12.0 Engine Online</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-md border border-gray-100">
        <h2 class="text-xl font-semibold mb-6 text-gray-700">Medical Image Translation (CycleGAN)</h2>

        <form id="uploadForm" class="space-y-6">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Translation Direction</label>
                <select id="conversionType" name="type" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    <option value="ct_to_mri">CT Scan ➔ MRI</option>
                    <option value="mri_to_ct">MRI ➔ CT Scan</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Upload Images (Up to 4)</label>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="file" id="image1" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-200 rounded-lg p-2">
                    <input type="file" id="image2" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-200 rounded-lg p-2">
                    <input type="file" id="image3" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-200 rounded-lg p-2">
                    <input type="file" id="image4" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-200 rounded-lg p-2">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex justify-center items-center">
                <span>Translate Images</span>
            </button>
        </form>

        <div id="loading" class="hidden mt-8 flex flex-col items-center justify-center p-6 border-2 border-dashed border-gray-200 rounded-lg bg-gray-50">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p class="text-gray-600 font-medium text-center">AI Models are processing your images...<br><span class="text-sm text-gray-400">This may take 10-20 seconds.</span></p>
        </div>

        <div id="resultsContainer" class="hidden mt-10">
            <h3 class="text-lg font-bold text-gray-800 border-b pb-2 mb-6">Translation Results</h3>
            <div id="imageGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
        </div>

    </main>

    <script>
        // Point this to your live Render backend
        const API_URL = "https://i-translation-backend.onrender.com/convert";

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultsContainer = document.getElementById('resultsContainer');
            const imageGrid = document.getElementById('imageGrid');
            
            // Reset UI
            imageGrid.innerHTML = '';
            resultsContainer.classList.add('hidden');
            loading.classList.remove('hidden');
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                // Build the payload
                const formData = new FormData();
                formData.append('type', document.getElementById('conversionType').value);
                
                let hasFiles = false;
                for (let i = 1; i <= 4; i++) {
                    const fileInput = document.getElementById(`image${i}`);
                    if (fileInput.files.length > 0) {
                        formData.append(`image${i}`, fileInput.files[0]);
                        hasFiles = true;
                    }
                }

                if (!hasFiles) {
                    alert("Please upload at least one image.");
                    throw new Error("No files selected");
                }

                // Call your Render API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `Server Error: ${response.status}`);
                }

                const data = await response.json();

                // Display Results
                Object.keys(data).forEach(key => {
                    if (!key.includes('error')) {
                        const base64Img = data[key];
                        const imgWrapper = document.createElement('div');
                        imgWrapper.className = "bg-white p-3 rounded-lg shadow border border-gray-100 flex flex-col items-center";
                        
                        // Parse name (e.g., 'image1_G' -> 'Image 1 (Gen G)')
                        const formattedName = key.replace('image', 'Image ').replace('_', ' - Generator ');

                        imgWrapper.innerHTML = `
                            <span class="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">${formattedName}</span>
                            <img src="data:image/png;base64,${base64Img}" class="rounded-md w-full object-cover aspect-square bg-black shadow-sm" alt="${key}">
                            <a href="data:image/png;base64,${base64Img}" download="${key}_translated.png" class="mt-3 text-sm text-blue-600 hover:text-blue-800 font-medium">Download</a>
                        `;
                        imageGrid.appendChild(imgWrapper);
                    }
                });

                resultsContainer.classList.remove('hidden');

            } catch (error) {
                console.error("Translation Error:", error);
                alert(error.message === "Failed to fetch" ? "Network error: Make sure the Render backend is fully awake and online." : error.message);
            } finally {
                // Restore UI
                loading.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
